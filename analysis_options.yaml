# This file configures the static analysis results for your project (errors,
# warnings, and lints). It helps maintain code quality and consistency.
#
# The file is structured into sections for configuring the analyzer and the linter.
# For more information, see: https://dart.dev/guides/language/analysis-options

# The 'analyzer' section configures the Dart static analyzer.
analyzer:
  # The 'exclude' section lists files and directories to be ignored by the analyzer.
  # This is useful for generated files that you don't want to modify directly.
  exclude:
    # Excludes all files ending with .g.dart, which are commonly generated by tools like build_runner.
    - '**/*.g.dart'
    # Excludes all files ending with .freezed.dart, generated by the freezed package.
    - '**/*.freezed.dart'

  # The 'errors' section allows you to customize the severity of specific analysis issues.
  errors:
    # Treats missing required parameters in function calls as a compile-time error.
    # This helps catch bugs early.
    missing_required_param: error

# The 'linter' section configures the set of lint rules to be enforced for your project.
linter:
  # The 'rules' section contains a list of lint rules to enable.
  # These rules are from the flutter_lints package, which provides a recommended set of lints for Flutter apps.
  # For a full list and explanation of each rule, see: https://dart-lang.github.io/linter/lints/index.html
  rules:
    # --- Code Style Rules ---

    # Enforce that return types are always specified for functions.
    - always_declare_return_types
    # Ensures that '@required' named parameters are listed before other named parameters.
    - always_put_required_named_parameters_first
    # Enforce annotating overridden members with @override.
    - annotate_overrides
    # Avoid empty 'else' statements.
    - avoid_empty_else
    # Avoid initializing variables to null when they are not explicitly nullable.
    - avoid_init_to_null
    # Avoid using relative paths for imports from the 'lib' directory.
    - avoid_relative_lib_imports
    # Use camelCase for extension names.
    - camel_case_extensions
    # Use UpperCamelCase for type names (classes, enums, etc.).
    - camel_case_types
    # Prefer using adjacent strings for concatenation. e.g., 'hello' ' world' instead of 'hello' + ' world'.
    - prefer_adjacent_string_concatenation
    # Prefer using collection literals (`[]`, `{}`, `<>[]`) for creating collections.
    - prefer_collection_literals
    # Prefer using `??=` over `if (x == null) x = y;`.
    - prefer_conditional_assignment

    # --- Const-related Rules (for performance) ---

    # Prefer using `const` for constructors where possible.
    - prefer_const_constructors
    # In immutable classes, prefer `const` constructors.
    - prefer_const_constructors_in_immutables
    # Prefer `const` for variable declarations that can be compile-time constants.
    - prefer_const_declarations
    # Avoid `unnecessary_const` keywords where the context already implies const.
    - unnecessary_const
    # Avoid `unnecessary_new` keywords. The 'new' keyword is optional in Dart 2.
    - unnecessary_new

    # --- Null-safety and Error Handling ---

    # Avoid null checks in equality operators (`==`).
    - avoid_null_checks_in_equality_operators
    # Only `await` futures.
    - await_only_futures
    # Avoid empty `catch` blocks.
    - empty_catches
    # Prefer `?.` (null-aware operator) over explicit null checks.
    - prefer_if_null_operators
    # Catch unawaited futures, which might hide errors.
    - unawaited_futures

    # --- General Readability and Maintainability ---

    # Fields in a class that can be final should be.
    - prefer_final_fields
    # Local variables that are not reassigned should be final.
    - prefer_final_locals
    # Use `isEmpty` instead of checking `length == 0`.
    - prefer_is_empty
    # Use `isNotEmpty` instead of checking `length != 0`.
    - prefer_is_not_empty
    # Avoid unnecessary curly braces in string interpolations.
    - unnecessary_brace_in_string_interps
    # Avoid unnecessary `this` keywords.
    - unnecessary_this
    # Avoid parentheses where they are not needed.
    - unnecessary_parenthesis

    # ... and many other rules that enforce good practices.
    # The list below is the remainder of the recommended set from flutter_lints.
    - avoid_return_types_on_setters
    - avoid_shadowing_type_parameters
    - avoid_single_cascade_in_expression_statements
    - avoid_types_as_parameter_names
    - cancel_subscriptions
    - control_flow_in_finally
    - empty_constructor_bodies
    - empty_statements
    - hash_and_equals
    - implementation_imports
    - iterable_contains_unrelated_type
    - list_remove_unrelated_type
    - no_duplicate_case_values
    - non_constant_identifier_names
    - package_prefixed_library_names
    - prefer_const_literals_to_create_immutables
    - prefer_contains
    - prefer_equal_for_default_values
    - prefer_final_in_for_each
    - prefer_for_elements_to_map_fromIterable
    - prefer_function_declarations_over_variables
    - prefer_generic_function_type_aliases
    - prefer_initializing_formals
    - prefer_inlined_adds
    - prefer_is_not_operator
    - prefer_iterable_whereType
    - prefer_null_aware_operators
    - prefer_spread_collections
    - prefer_typing_uninitialized_variables
    - recursive_getters
    - slash_for_doc_comments
    - sort_child_properties_last
    - test_types_in_equals
    - throw_in_finally
    - type_annotate_public_apis
    - type_init_formals
    - unnecessary_getters_setters
    - unnecessary_null_aware_assignments
    - unnecessary_null_in_if_null_operators
    - unnecessary_overrides
    - unnecessary_statements
    - unrelated_type_equality_checks
    - use_rethrow_when_possible
    - valid_regexps
